name: Biotech Daily Monitor

on:
  schedule:
    # 每天 UTC 01:00 执行 (对应美东 21:00)
    - cron: '0 1 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch: # 允许手动点按钮执行

jobs:
  run-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许 Action 提交 sent_urls.txt 回仓库
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install feedparser cloudscraper beautifulsoup4 openai requests

      - name: Run logic
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Save state
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add sent_urls.txt
          git commit -m "Update sent database" || exit 0
          git push
